<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Bold D letterform with integrated dock/slot motif -->
  <!-- Main D shape as negative space container -->
  <path d="M24 16 L24 112 L72 112 C100 112 112 88 112 64 C112 40 100 16 72 16 Z" fill="#000000"/>
  <!-- Inner cutout creating D letterform -->
  <path d="M44 36 L44 92 L68 92 C84 92 92 80 92 64 C92 48 84 36 68 36 Z" fill="#FFFFFF"/>
  <!-- Three horizontal slots inside D - the "docket" lines -->
  <rect x="48" y="48" width="28" height="6" rx="2" fill="#000000"/>
  <rect x="48" y="61" width="20" height="6" rx="2" fill="#000000"/>
  <rect x="48" y="74" width="24" height="6" rx="2" fill="#000000"/>
</svg>
