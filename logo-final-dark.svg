      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <!-- Bold D letterform - brighter emerald for dark backgrounds -->
  <path d="M24 12 L24 116 L70 116 C102 116 116 92 116 64 C116 36 102 12 70 12 Z" fill="url(#devdocket-dark)"/>
