name: Weekly Review

# Authentication: this workflow runs GitHub Copilot CLI in programmatic mode.
# COPILOT_CLI_PAT is still required for Copilot CLI requests until #621 migrates
# this review to an agentic workflow. Issue creation via gh uses the short-lived
# DevDocket bot GitHub App token minted below.
on:
  # Run every Monday at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Manual trigger
  workflow_dispatch:

concurrency:
  group: weekly-code-review
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  expert-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEVDOCKET_BOT_APP_ID }}
          private-key: ${{ secrets.DEVDOCKET_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run weekly review
        env:
          # COPILOT_CLI_PAT remains only for Copilot CLI auth until #621 removes it.
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -o pipefail
          copilot -p "$(cat .github/prompts/weekly-review.md)" \
            --model claude-opus-4.7 \
            --allow-tool='shell(gh issue:*)' \
            --allow-tool=read \
            --allow-tool=create \
            --allow-tool=write \
            --no-ask-user | tee weekly-review.log

      - name: Summary
        if: always()
        run: |
          count="$(grep -Eo 'WEEKLY_REVIEW_ISSUES_CREATED=[0-8]' weekly-review.log 2>/dev/null | tail -n 1 | cut -d= -f2 || true)"
          if [ -z "$count" ]; then
            echo "⚠️ Weekly review completed, but no issue-count marker was found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Weekly review issues created: $count" >> "$GITHUB_STEP_SUMMARY"
          fi
