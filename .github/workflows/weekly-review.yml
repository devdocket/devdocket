name: Weekly Review

on:
  # Run every Monday at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Manual trigger
  workflow_dispatch:

concurrency:
  group: weekly-code-review
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  expert-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEVDOCKET_BOT_APP_ID }}
          private-key: ${{ secrets.DEVDOCKET_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Build issue body
        id: build-body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const promptContent = fs.readFileSync('.github/prompts/weekly-review.md', 'utf8');

            const body = [
              '## Weekly Codebase Review Request',
              '',
              'This issue was created automatically by the scheduled Weekly Review workflow.',
              '',
              '### Task',
              '',
              'Act as a senior VS Code extension developer reviewing this codebase. Follow the weekly review methodology embedded below to identify implementation patterns, API correctness risks, and product decisions that create real maintenance burden, correctness risk, or mismatch with VS Code extension best practices. Open a separate GitHub issue for each substantive finding.',
              '',
              '### Review Methodology',
              '',
              promptContent,
              '',
              '---',
              '',
              '_Scheduled weekly review triggered at ' + new Date().toISOString() + '_'
            ].join('\n');

            core.setOutput('body', body);

      - name: Create issue and assign Copilot agent
        id: create-issue
        uses: ./.github/actions/create-copilot-issue
        with:
          issue-title: 'Weekly codebase review'
          issue-body: ${{ steps.build-body.outputs.body }}
          issue-labels: 'copilot,automated,weekly-review'
          dedup-labels: 'automated,weekly-review'
          custom-instructions: |
            Follow the weekly codebase review methodology embedded in the issue body.

            The issue contains the full review workflow including:
            1. Required context — VS Code extension API knowledge and repository understanding
            2. Review scope — resource lifecycle, API correctness, storage/state, public API surface, code organization, product complexity
            3. Finding quality bar — substantive issues only; skip style nits and cosmetic concerns

            Key principles:
            - Open a separate GitHub issue for each substantive finding
            - Focus on real maintenance burden, correctness risk, or VS Code conventions mismatch
            - Skip style nits, naming preferences, linting-level concerns, and anything working fine

            If you find no substantive concerns, close this issue with a brief explanation of what was reviewed.
          copilot-assign-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Summary
        if: always()
        env:
          CREATE_CONCLUSION: ${{ steps.create-issue.conclusion }}
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue-number }}
          CREATED: ${{ steps.create-issue.outputs.created }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          url=""
          if [ -n "${ISSUE_NUMBER}" ]; then
            url="${SERVER}/${REPO}/issues/${ISSUE_NUMBER}"
          fi
          if [ "${CREATE_CONCLUSION}" = "success" ]; then
            if [ -z "${ISSUE_NUMBER}" ]; then
              echo "⚠️ Weekly review did not produce an issue." >> "$GITHUB_STEP_SUMMARY"
            elif [ "${CREATED}" = "true" ]; then
              echo "✅ Created weekly review issue [#${ISSUE_NUMBER}](${url})" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ℹ️ Open weekly review issue already exists: [#${ISSUE_NUMBER}](${url})" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            if [ -n "${ISSUE_NUMBER}" ]; then
              echo "❌ Weekly review failed after creating issue [#${ISSUE_NUMBER}](${url}) (see job logs for details)." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ Weekly review failed before any issue was created (see job logs for details)." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
