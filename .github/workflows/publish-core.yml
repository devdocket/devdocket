name: Publish DevDocket Core

on:
  push:
    tags:
      - "core-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/_publish-vscode-extension.yml
    with:
      package-directory: packages/core
      package-title: DevDocket Core
      tag-prefix: core-v
