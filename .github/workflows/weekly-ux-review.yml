name: Weekly UX Review

on:
  # Run every Wednesday at 10:00 AM UTC (offset from implementation review)
  schedule:
    - cron: '0 10 * * 3'
  # Manual trigger for testing
  workflow_dispatch:

concurrency:
  group: weekly-ux-review
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  weekly-ux-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEVDOCKET_BOT_APP_ID }}
          private-key: ${{ secrets.DEVDOCKET_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Build issue body
        id: build-body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const promptContent = fs.readFileSync('.github/prompts/weekly-ux-review.md', 'utf8');

            const body = [
              '## Weekly UX Review Request',
              '',
              'This issue was created automatically by the scheduled Weekly UX Review workflow.',
              '',
              '### Task',
              '',
              'Review the DevDocket extension UX for friction, confusion, and mismatch with VS Code interaction conventions. Follow the methodology embedded below and open a separate GitHub issue for each substantive UX finding.',
              '',
              '### Review Methodology',
              '',
              promptContent,
              '',
              '---',
              '',
              '_Scheduled weekly UX review triggered at ' + new Date().toISOString() + '_'
            ].join('\n');

            core.setOutput('body', body);

      - name: Create issue and assign Copilot agent
        id: create-issue
        uses: ./.github/actions/create-copilot-issue
        with:
          issue-title: 'Weekly UX review'
          issue-body: ${{ steps.build-body.outputs.body }}
          issue-labels: 'copilot,automated,weekly-ux-review'
          dedup-labels: 'automated,weekly-ux-review'
          custom-instructions: |
            Follow the weekly UX review methodology embedded in the issue body.

            Focus on substantive UX concerns:
            - Friction in core user flows
            - Inconsistency with VS Code interaction conventions
            - Confusing or misleading UI states, labels, or affordances
            - Missing feedback for long-running or destructive actions
            - Accessibility gaps that block real usage

            Skip cosmetic nits, color preferences, and personal style.

            Open a separate GitHub issue for each substantive finding. If no substantive
            UX concerns are found, close this issue with a brief explanation of what was reviewed.
          copilot-assign-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Summary
        if: always()
        env:
          CREATE_CONCLUSION: ${{ steps.create-issue.conclusion }}
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue-number }}
          CREATED: ${{ steps.create-issue.outputs.created }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          url=""
          if [ -n "${ISSUE_NUMBER}" ]; then
            url="${SERVER}/${REPO}/issues/${ISSUE_NUMBER}"
          fi
          if [ "${CREATE_CONCLUSION}" = "success" ]; then
            if [ -z "${ISSUE_NUMBER}" ]; then
              echo "⚠️ Weekly UX review did not produce an issue." >> "$GITHUB_STEP_SUMMARY"
            elif [ "${CREATED}" = "true" ]; then
              echo "✅ Created weekly UX review issue [#${ISSUE_NUMBER}](${url})" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ℹ️ Open weekly UX review issue already exists: [#${ISSUE_NUMBER}](${url})" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            if [ -n "${ISSUE_NUMBER}" ]; then
              echo "❌ Weekly UX review failed after creating issue [#${ISSUE_NUMBER}](${url}) (see job logs for details)." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ Weekly UX review failed before any issue was created (see job logs for details)." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
