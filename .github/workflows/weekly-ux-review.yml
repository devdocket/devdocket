name: Weekly UX Review

on:
  # Run every Wednesday at 10:00 AM UTC (offset from implementation review)
  schedule:
    - cron: '0 10 * * 3'
  # Manual trigger for testing
  workflow_dispatch:

concurrency:
  group: weekly-ux-review
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  create-ux-review-issue:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      should_assign: ${{ steps.create-issue.outputs.should_assign }}
    steps:
      - uses: actions/checkout@v4

      - name: Create UX review tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            // UX review prompt (from issue #308)
            const uxPrompt = `First, review the latest VS Code UX guidelines (https://code.visualstudio.com/api/ux-guidelines/overview) and the VS Code extension API documentation (https://code.visualstudio.com/api). Then, act as a senior UX designer who specializes in developer tools and VS Code extensions, reviewing this extension for the first time. Identify concrete areas where the user experience is confusing, inefficient, or inconsistent — not minor polish items, but workflow-level problems that cause real user friction. Before reporting a finding, check the GitHub issue tracker to see if it's already filed. For each finding: name the UX problem, describe current user experience, explain concrete impact, describe what it should be instead. Focus areas: workflow completeness, cognitive load, discoverability, feedback & state visibility, efficiency for repeat use, information architecture, error & edge cases, platform fit, accessibility & inclusivity. Skip icon choices, color preferences, wording tweaks.`;

            // Ensure weekly-ux-review label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'weekly-ux-review'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'weekly-ux-review',
                  color: '0E8A16',
                  description: 'Weekly automated UX review tracking issue'
                });
                core.info('Created weekly-ux-review label');
              } else {
                core.setFailed(`Failed to get/create weekly-ux-review label: ${e.message}`);
                throw e;
              }
            }

            // Check for existing open UX review issues
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'weekly-ux-review',
              state: 'open',
              per_page: 1
            });

            const existingIssue = existing.find(item => !item.pull_request);

            if (existingIssue) {
              core.info(`Skipping: open UX review issue #${existingIssue.number} already exists`);
              core.setOutput('should_assign', 'false');
              return;
            }

            // Create tracking issue
            const dateStr = new Date().toISOString().split('T')[0];

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly UX Review — ${dateStr}`,
              body: [
                '## 🎨 Weekly UX Expert Review',
                '',
                'This issue tracks the automated weekly UX review of the DevDocket extension.',
                '',
                '---',
                '',
                '### Instructions for @copilot',
                '',
                uxPrompt,
                '',
                '---',
                '',
                '### Workflow',
                '',
                '1. **Review:** @copilot will analyze the codebase using the prompt above',
                '2. **Dedup:** Before creating issues, search existing issues (open and closed)',
                '3. **File findings:** Create individual issues for novel UX problems with:',
                '   - Clear title summarizing the UX problem',
                '   - Full finding details in the body',
                '   - Label: `enhancement`, `type:bug`, or `type:chore` (based on nature)',
                '   - Reference this tracking issue',
                '4. **Close:** Once all findings are filed, close this tracking issue',
                '',
                '> **Note:** This is an automated UX review. Focus on workflow-level problems that cause real user friction, not cosmetic polish.',
              ].join('\n'),
              labels: ['weekly-ux-review', 'squad:copilot']
            });

            core.info(`Created UX review tracking issue: #${issue.number}`);
            core.setOutput('issue_number', issue.number);
            core.setOutput('should_assign', 'true');
            return issue.number;

  assign-copilot-agent:
    needs: create-ux-review-issue
    if: needs.create-ux-review-issue.outputs.should_assign == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assign @copilot coding agent
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.create-ux-review-issue.outputs.issue_number }}
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = parseInt(process.env.ISSUE_NUMBER, 10);

            // Get the default branch name
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const baseBranch = repoData.default_branch;

            const customInstructions = [
              'Read .squad/team.md for team context.',
              'This is a weekly UX review — focus on workflow-level UX problems, not cosmetic issues.',
              'Search existing issues (open and closed) thoroughly before creating new ones.'
            ].join('\n');

            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner,
                repo,
                issue_number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${owner}/${repo}`,
                  base_branch: baseBranch,
                  custom_instructions: customInstructions,
                  custom_agent: '',
                  model: ''
                },
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28'
                }
              });
              core.info(`✅ Assigned copilot-swe-agent[bot] to issue #${issue_number}`);
            } catch (err) {
              core.warning(`Assignment with agent_assignment failed: ${err.message}`);
              // Fallback: try without agent_assignment
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: ['copilot-swe-agent[bot]']
                });
                core.info(`Fallback: assigned copilot-swe-agent[bot] to issue #${issue_number}`);

                // Post custom instructions as a comment
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: [
                    '### 🤖 @copilot Instructions',
                    '',
                    customInstructions
                  ].join('\n')
                });
              } catch (err2) {
                core.error(`Both assignment attempts failed: ${err2.message}`);
                throw err2;
              }
            }
