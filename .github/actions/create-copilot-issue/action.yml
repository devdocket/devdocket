name: Create Copilot Issue
description: >
  Creates a GitHub issue with dedup checking and assigns the Copilot coding agent
  through GitHub's GraphQL assignment APIs.

inputs:
  issue-title:
    description: Title for the GitHub issue
    required: true
  issue-body:
    description: Body markdown for the GitHub issue
    required: true
  issue-labels:
    description: Comma-separated labels to apply to the issue
    required: true
  dedup-labels:
    description: >
      Comma-separated labels to check for duplicate open issues.
      Defaults to issue-labels if not specified.
    required: false
    default: ''
  dedup-title:
    description: >
      If provided, dedup also requires the issue title to match exactly.
      Use when the same labels appear on multiple issues (e.g., weekly dated issues).
    required: false
    default: ''
  custom-instructions:
    description: Instructions to provide to the Copilot coding agent
    required: true
  copilot-assign-token:
    description: >
      Token with permission to assign the Copilot coding agent. Must be a user
      PAT or OAuth token that can call the suggestedActors GraphQL API; GitHub
      App installation tokens cannot assign Copilot agents.
    required: false
    default: ''
  github-token:
    description: GitHub token for issue creation
    required: true

outputs:
  issue-number:
    description: The number of the created or existing issue
    value: ${{ steps.create-issue.outputs.issue_number }}
  created:
    description: Whether a new issue was created ('true' or 'false')
    value: ${{ steps.create-issue.outputs.created }}

runs:
  using: composite
  steps:
    - name: Create issue with dedup check
      id: create-issue
      uses: actions/github-script@v7
      env:
        INPUT_ISSUE_TITLE: ${{ inputs.issue-title }}
        INPUT_ISSUE_BODY: ${{ inputs.issue-body }}
        INPUT_ISSUE_LABELS: ${{ inputs.issue-labels }}
        INPUT_DEDUP_LABELS: ${{ inputs.dedup-labels || inputs.issue-labels }}
        INPUT_DEDUP_TITLE: ${{ inputs.dedup-title }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const dedupLabels = process.env.INPUT_DEDUP_LABELS;
          const dedupTitle = process.env.INPUT_DEDUP_TITLE;

          // Escape values interpolated into GitHub search quoted qualifiers
          function escapeSearchValue(value) {
            return String(value).replace(/[\r\n]+/g, ' ').trim().replace(/\\/g, '\\\\').replace(/"/g, '\\"');
          }

          // Use search API for dedup to avoid pagination limits of listForRepo
          const labels = dedupLabels.split(',').map(l => l.trim()).filter(Boolean);
          if (labels.length === 0) {
            core.setFailed('dedup-labels resolved to an empty list — at least one label is required');
            return;
          }
          const labelQuery = labels.map(l => `label:"${escapeSearchValue(l)}"`).join(' ');
          const titleQuery = dedupTitle ? `"${escapeSearchValue(dedupTitle)}" in:title` : '';
          const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open ${labelQuery} ${titleQuery}`.trim();

          // Paginate search results so duplicates beyond the first page aren't missed
          let existingIssue = null;
          for await (const response of github.paginate.iterator(
            github.rest.search.issuesAndPullRequests, { q, per_page: 100 }
          )) {
            const match = response.data.find(item =>
              !item.pull_request &&
              (!dedupTitle || item.title === dedupTitle)
            );
            if (match) {
              existingIssue = match;
              break;
            }
          }

          if (existingIssue) {
            core.info(`Skipping: open issue #${existingIssue.number} already exists (dedup labels: ${dedupLabels})`);
            core.setOutput('issue_number', existingIssue.number);
            core.setOutput('created', 'false');
            return;
          }

          const issueLabels = process.env.INPUT_ISSUE_LABELS.split(',').map(l => l.trim());

          const { data: issue } = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: process.env.INPUT_ISSUE_TITLE,
            body: process.env.INPUT_ISSUE_BODY,
            labels: issueLabels
          });

          core.info(`Created issue #${issue.number}`);
          core.setOutput('issue_number', issue.number);
          core.setOutput('created', 'true');

    - name: Validate Copilot assignment token
      if: steps.create-issue.outputs.created == 'true'
      shell: bash
      env:
        COPILOT_ASSIGN_TOKEN: ${{ inputs.copilot-assign-token }}
      run: |
        set -euo pipefail
        if [ -z "${COPILOT_ASSIGN_TOKEN}" ]; then
          echo "::error::copilot-assign-token is required to assign the Copilot coding agent. Configure COPILOT_ASSIGN_TOKEN with a user/OAuth token that can call the Copilot assignment GraphQL APIs."
          exit 1
        fi

    - name: Assign Copilot coding agent
      if: steps.create-issue.outputs.created == 'true'
      uses: actions/github-script@v7
      env:
        ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue_number }}
        CUSTOM_INSTRUCTIONS: ${{ inputs.custom-instructions }}
      with:
        github-token: ${{ inputs.copilot-assign-token }}
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
          const customInstructions = process.env.CUSTOM_INSTRUCTIONS;
          const copilotLogins = new Set(['copilot', 'copilot-swe-agent', 'copilot-swe-agent[bot]']);
          const graphqlHeaders = {
            'GraphQL-Features': 'issues_copilot_assignment_api_support'
          };

          const lookup = await github.graphql(`
            query LookupCopilotAssignable($owner: String!, $repo: String!, $issueNumber: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $issueNumber) {
                  id
                }
                suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                  nodes {
                    __typename
                    login
                    ... on Bot {
                      id
                    }
                  }
                }
              }
            }
          `, { owner, repo, issueNumber, headers: graphqlHeaders });

          const issue = lookup.repository.issue;
          if (!issue?.id) {
            throw new Error(`Could not resolve GraphQL node ID for issue #${issueNumber}`);
          }

          const copilotActor = lookup.repository.suggestedActors.nodes.find(actor =>
            actor.__typename === 'Bot' && actor.login && copilotLogins.has(actor.login.toLowerCase()) && actor.id
          );
          if (!copilotActor) {
            const suggestedLogins = lookup.repository.suggestedActors.nodes.map(actor => actor.login).join(', ') || '(none)';
            throw new Error(`Copilot was not returned by suggestedActors(CAN_BE_ASSIGNED). Suggested actors: ${suggestedLogins}. Check that copilot-assign-token is a user/OAuth token with access to assign Copilot.`);
          }

          await github.graphql(`
            mutation AssignCopilot($assignableId: ID!, $actorIds: [ID!]!) {
              replaceActorsForAssignable(input: { assignableId: $assignableId, actorIds: $actorIds }) {
                assignable {
                  ... on Issue {
                    number
                  }
                }
              }
            }
          `, { assignableId: issue.id, actorIds: [copilotActor.id], headers: graphqlHeaders });

          const verification = await github.graphql(`
            query VerifyCopilotAssignee($owner: String!, $repo: String!, $issueNumber: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $issueNumber) {
                  assignees(first: 10) {
                    nodes {
                      id
                      login
                    }
                  }
                }
              }
            }
          `, { owner, repo, issueNumber, headers: graphqlHeaders });

          const assignees = verification.repository.issue.assignees.nodes;
          if (assignees.length === 0) {
            throw new Error(`Copilot assignment did not stick: issue #${issueNumber} still has zero assignees after replaceActorsForAssignable`);
          }
          // Issue.assignees surfaces Copilot as a User-shaped node whose node ID
          // differs from the Bot ID returned by suggestedActors. Verify by login
          // (case-insensitive) against the same set we matched on lookup.
          if (!assignees.some(assignee => assignee.login && copilotLogins.has(assignee.login.toLowerCase()))) {
            const assigneeLogins = assignees.map(assignee => assignee.login).join(', ');
            throw new Error(`Copilot assignment did not stick: issue #${issueNumber} assignees are ${assigneeLogins}, expected ${copilotActor.login}`);
          }

          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number: issueNumber,
            body: `### 🤖 @copilot Instructions\n\n${customInstructions}`
          });

          core.info(`Assigned ${copilotActor.login} to issue #${issueNumber} and posted Copilot instructions`);
