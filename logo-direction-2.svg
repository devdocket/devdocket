<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Stacked layers representing organized docket -->
  <!-- Bottom layer -->
  <rect x="20" y="80" width="88" height="16" rx="4" fill="#6366F1" opacity="0.5"/>
  <!-- Middle layer -->
  <rect x="16" y="56" width="96" height="20" rx="5" fill="#8B5CF6" opacity="0.75"/>
  <!-- Top layer - main focus -->
  <rect x="12" y="28" width="104" height="24" rx="6" fill="url(#grad2)"/>
  <!-- Accent notch on top layer suggesting active/current item -->
  <rect x="20" y="34" width="6" height="12" rx="2" fill="#FFFFFF"/>
  <!-- Second notch -->
  <rect x="32" y="34" width="50" height="5" rx="2" fill="#FFFFFF" opacity="0.9"/>
  <rect x="32" y="43" width="30" height="3" rx="1" fill="#FFFFFF" opacity="0.6"/>
</svg>
